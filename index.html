<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capped</title>
<link rel="manifest" href="manifest.json">
<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0f172a;
    color:white;
}
.header{
    background:linear-gradient(135deg,#0b5e2b,#15803d);
    padding:30px 20px;
    border-bottom-left-radius:24px;
    border-bottom-right-radius:24px;
    text-align:center;
}
.handicap{
    font-size:64px;
    font-weight:700;
    margin:10px 0;
}
.container{
    padding:18px;
    max-width:700px;
    margin:auto;
}
.card{
    background:#1e293b;
    border-radius:18px;
    padding:18px;
    margin-bottom:18px;
}
input{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    font-size:16px;
}
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#16a34a;
    color:white;
    font-size:18px;
    font-weight:600;
    margin-top:10px;
    cursor:pointer;
}
.round{
    background:#334155;
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
    position: relative;
}
.delete-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    color: #ef4444;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
}
.small{
    opacity:.8;
    font-size:14px;
}
.course{
    color:#86efac;
    font-weight:600;
    padding-right: 25px;
}
</style>
</head>
<body>

<div class="header">
    <div class="small">Capped</div>
    <div class="handicap" id="handicap">25.0</div>
    <div>World Handicap System Calculation</div>
</div>

<div class="container">

<div class="card">
    <h2>Add Round</h2>

    <input type="date" id="date">
    <input type="text" id="course" placeholder="Course Name">
    <input type="number" id="score" placeholder="Adjusted Gross Score">
    <input type="number" step="0.1" id="rating" placeholder="Course Rating">
    <input type="number" id="slope" placeholder="Slope Rating">

    <button onclick="addRound()">Add Score</button>
</div>

<div class="card">
    <h2>Recent Rounds</h2>
    <div id="rounds"></div>
</div>

</div>

<script>
let rounds = JSON.parse(localStorage.getItem("cappedRounds")) || [];

// Populate exactly 20 initial placeholder rounds if the log database is empty
if(rounds.length === 0){
    for(let i = 0; i < 20; i++){
        rounds.push({
            date: "Initial Setup",
            course: "Starter Scores",
            score: "-",
            rating: "-",
            slope: "-",
            differential: 25.0
        });
    }
    save();
}

function save(){
    localStorage.setItem("cappedRounds", JSON.stringify(rounds));
}

function calcHandicap(){
    let diffs = rounds.map(r => parseFloat(r.differential)).filter(v => !isNaN(v));
    let recent20 = diffs.slice(-20);
    
    // Sort a cloned spread copy to avoid mutating the historical array data alignment
    let best8 = [...recent20].sort((a, b) => a - b).slice(0, 8);
    
    if (best8.length === 0) return "54.0"; 
    
    let avg = best8.reduce((a, b) => a + b, 0) / best8.length;
    return avg.toFixed(1);
}

function render(){
    document.getElementById("handicap").innerText = calcHandicap();
    let html = "";
    
    // Process matching data in reverse to position modern logs at the top
    [...rounds].reverse().forEach((r, index) => {
        let originalIndex = rounds.length - 1 - index;
        
        html += `
        <div class="round">
            <span class="delete-btn" onclick="deleteRound(${originalIndex})">✕</span>
            <div class="course">${r.course}</div>
            <div>${r.date}</div>
            <div>Score: ${r.score}</div>
            <div>Rating: ${r.rating} | Slope: ${r.slope}</div>
            <div><strong>Differential: ${r.differential}</strong></div>
        </div>`;
    });

    document.getElementById("rounds").innerHTML = html;
}

function deleteRound(index) {
    if (confirm("Are you sure you want to delete this round?")) {
        rounds.splice(index, 1);
        save();
        render();
    }
}

function setTodayDate(){
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("date").value = today;
}

function addRound(){
    let date = document.getElementById("date").value;
    let course = document.getElementById("course").value.trim() || "Unknown Course";
    let score = parseFloat(document.getElementById("score").value);
    let rating = parseFloat(document.getElementById("rating").value);
    let slope = parseFloat(document.getElementById("slope").value);

    if(isNaN(score) || isNaN(rating) || isNaN(slope)){
        alert("Please complete all fields.");
        return;
    }

    if (slope < 55 || slope > 155) {
        alert("Please enter a valid USGA Slope Rating (between 55 and 155).");
        return;
    }

    let differential = ((score - rating) * 113 / slope).toFixed(1);

    // Actively drop standard seed markers as new data populates
    if (rounds.length > 0 && rounds[0].course === "Starter Scores") {
        rounds.shift(); 
    }

    rounds.push({
        date, course, score, rating, slope, differential: parseFloat(differential)
    });

    save();
    render();

    document.getElementById("course").value = "";
    document.getElementById("score").value = "";
    document.getElementById("rating").value = "";
    document.getElementById("slope").value = "";

    setTodayDate();
}

render();
setTodayDate();

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
